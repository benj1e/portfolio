name: Deploy to GitHub Pages

on:
    push:
        paths:
            - "projects.json"
            - "career.json"
            - "src/**"
            - "public/**"
            - ".github/workflows/deploy.yml"
        branches:
            - main
jobs:
  build-deploy:
    runs-on: ubuntu-latest
    
    # 1. This permission block is still required and correct.
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm ci

      - name: Set Git user identity
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"

      - name: Build project
        run: npm run build

      # 2. Use your original deploy command that constructs the remote URL.
      # This explicitly tells gh-pages how to authenticate.
      - name: Deploy to GitHub Pages
        run: |
          REMOTE_REPO="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          npm run deploy -- -r "$REMOTE_REPO"
        env:
          CI: true

      - name: Ensure career.json and projects.json exist
        run: |
          if [ ! -f public/career.json ]; then
            echo '[{}]' > public/career.json
            git add public/career.json
          fi
          if [ ! -f public/projects.json ]; then
            echo '[{}]' > public/projects.json
            git add public/projects.json
          fi
          if git diff --cached --quiet; then
            echo "No new files to commit."
          else
            git commit -m "Add missing career.json and/or projects.json"
            git push
          fi
